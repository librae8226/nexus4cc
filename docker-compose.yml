version: "3.9"
services:
  nexus:
    build:
      context: .
      dockerfile: Dockerfile
    image: cc:nexus
    container_name: nexus
    restart: unless-stopped
    environment:
      JWT_SECRET: ${JWT_SECRET}
      ACC_PASSWORD_HASH: ${ACC_PASSWORD_HASH}
      TMUX_SESSION: ${TMUX_SESSION:-main}
      WORKSPACE_ROOT: ${WORKSPACE_ROOT:-/home/librae}
      PORT: 3000
    ports:
      - "59000:3000"
    volumes:
      # 宿主机工作区整体挂载，路径与宿主机保持一致，claude 需要写权限
      - ${HOST_WORKSPACE:-/home/librae}:${CONTAINER_WORKSPACE:-/home/librae}
      # toolbar 配置等持久化数据，重建容器不丢失
      - nexus-data:/app/data

volumes:
  nexus-data:
